aid: tiffany
url: https://raw.githubusercontent.com/api-evangelist/tiffany/refs/heads/main/apis.yml
name: Tiffany & Co.
description: >-
  Tiffany & Co. is a global luxury jeweler and specialty retailer founded in
  1837, acquired by LVMH in 2021. The company designs, manufactures, and sells
  jewelry, watches, fragrances, and accessories under the Tiffany brand across
  over 300 stores worldwide and a robust e-commerce platform. Tiffany operates
  a B2B corporate gifting platform and retail e-commerce site with back-end
  order management integration. The company does not currently offer a public
  developer API or partner developer program; integration is available through
  their corporate gifting portal and select enterprise channels.
image: https://www.tiffany.com/favicon.ico
tags:
  - Corporate Gifting
  - E-Commerce
  - Jewelry
  - Luxury Retail
  - Watches

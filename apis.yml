apis:
  - aid: tiffany:tiffany-ecommerce
    name: Tiffany & Co. E-Commerce Platform
    description: >-
      Tiffany & Co.'s direct-to-consumer e-commerce platform at tiffany.com,
      enabling online browsing, customization, and purchase of jewelry, watches,
      accessories, and home items. The platform supports product discovery by
      category, material, price, and occasion. No public API is documented;
      retail integration is through the website and mobile app.
    image: https://www.tiffany.com/favicon.ico
    humanURL: https://www.tiffany.com
    baseURL: https://www.tiffany.com
    tags:
      - E-Commerce
      - Jewelry
      - Luxury Retail
      - Retail
    properties:
      - type: Website
        url: https://www.tiffany.com
      - type: Mobile App
        url: https://www.tiffany.com/accessibility/

  - aid: tiffany:tiffany-corporate-gifting
    name: Tiffany & Co. Corporate Gifting Platform
    description: >-
      Tiffany & Co.'s B2B corporate gifting and recognition program platform,
      providing procurement and delivery of corporate gifts and recognition items.
      The platform includes order management system integration, advanced
      reporting, analytics, and e-catalog management. Enterprise clients may
      access order and catalog data through select B2B integrations.
    image: https://www.tiffany.com/favicon.ico
    humanURL: https://www.tiffany.com/en-us/gifts/corporate-gifting/
    baseURL: https://www.tiffany.com/en-us/gifts/corporate-gifting/
